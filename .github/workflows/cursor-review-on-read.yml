name: Cursor AI Review (on Ready for Review)

on:
  pull_request:
    types: [ready_for_review, synchronize]

jobs:
  cursor_review:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Cursor APT GPG key
        run: |
          curl -fsSL https://downloads.cursor.com/keys/anysphere.asc | gpg --dearmor | sudo tee /etc/apt/keyrings/cursor.gpg > /dev/null

      - name: Add Cursor APT repository
        run: |
          echo "deb [arch=amd64,arm64 signed-by=/etc/apt/keyrings/cursor.gpg] https://downloads.cursor.com/apt stable main" | sudo tee /etc/apt/sources.list.d/cursor.list > /dev/null

      - name: Install Cursor
        run: sudo apt update && sudo apt install -y cursor

      - name: Run Cursor PR review and post inline comments
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          python .github/scripts/cursor-inline-review.py