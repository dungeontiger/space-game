name: Cursor AI Review (on Ready for Review)

on:
  pull_request:
    types: [ready_for_review, synchronize]

jobs:
  cursor_review:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Cursor CLI
        # APT repo (downloads.cursor.com/apt) returns 403 from GitHub Actions; use documented install script.
        run: curl -fsSL https://cursor.com/install | bash

      - name: Run Cursor PR review and post inline comments
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          python .github/scripts/cursor-inline-review.py